name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python for bundled Whisper
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win
        env:
          PYTHON: python

      - name: Verify bundled Windows runtimes
        shell: pwsh
        run: |
          $appDir = "dist/win-unpacked/resources/app"
          $required = @(
            "vendor/tools/win32-x64/ffmpeg.exe",
            "vendor/tools/win32-x64/ffprobe.exe",
            "vendor/whisper/win32-x64/whisper-transcribe.exe",
            "vendor/whisper/models/faster-whisper-small/model.bin"
          )
          foreach ($item in $required) {
            if (-not (Test-Path (Join-Path $appDir $item))) {
              throw "Missing packaged runtime: $item"
            }
          }
          & (Join-Path $appDir "vendor/whisper/win32-x64/whisper-transcribe.exe") --self-test
          if ($LASTEXITCODE -ne 0) {
            throw "Bundled Whisper self-test failed."
          }

      - name: Upload installer release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "desktop-build-${{ github.run_id }}"
          $files = Get-ChildItem "dist" -File | Where-Object { $_.Name -like "*.exe" -or $_.Name -like "*.blockmap" }
          if (-not $files) {
            throw "No Windows installer files found in dist."
          }
          gh release create $tag @($files.FullName) `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "Desktop build $tag" `
            --notes "Temporary Windows installer build." `
            --prerelease
